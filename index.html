<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Card Manager EXO</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0e1a;
  --bg-panel: #111422;
  --bg-card: #161929;
  --bg-hover: #1c2035;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text-2: #8892b0;
  --text-3: #4a5270;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;

  --pk: #f4c800;
  --pk-dim: rgba(244,200,0,0.12);
  --pk-glow: rgba(244,200,0,0.25);
  --op: #e84040;
  --op-dim: rgba(232,64,64,0.12);
  --op-glow: rgba(232,64,64,0.25);
  --yg: #9b5de5;
  --yg-dim: rgba(155,93,229,0.12);
  --yg-glow: rgba(155,93,229,0.25);

  --accent: var(--pk);
  --accent-dim: var(--pk-dim);
  --accent-glow: var(--pk-glow);
}
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  position: relative;
}

/* ===== TCG BACKGROUND IMAGES ===== */
/* Fixed Vollbild-Hintergrund — beim Scrollen nicht mitwandern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -2;
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  background-image: none;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}
/* Dunkles Overlay drüber, damit Karten lesbar bleiben */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(180deg, rgba(12,14,26,0.82) 0%, rgba(12,14,26,0.92) 100%);
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

/* Nur sichtbar wenn App aktiv (nicht im Splash) */
body.app-active.tcg-pk::before { background-image: url('bg-pokemon.jpg'); opacity: 1; }
body.app-active.tcg-op::before { background-image: url('bg-onepiece.jpg'); opacity: 1; }
body.app-active.tcg-yg::before { background-image: url('bg-yugioh.jpg'); opacity: 1; }
body.app-active.tcg-pk::after,
body.app-active.tcg-op::after,
body.app-active.tcg-yg::after { opacity: 1; }

/* Panels leicht transparent, damit Hintergrund durchschimmert */
body.app-active.tcg-pk,
body.app-active.tcg-op,
body.app-active.tcg-yg {
  background: transparent;
}
body.app-active.tcg-pk .main-content,
body.app-active.tcg-op .main-content,
body.app-active.tcg-yg .main-content { background: transparent; }
body.app-active.tcg-pk .sidebar,
body.app-active.tcg-op .sidebar,
body.app-active.tcg-yg .sidebar { background: rgba(18,21,38,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
body.app-active.tcg-pk .main-topbar,
body.app-active.tcg-op .main-topbar,
body.app-active.tcg-yg .main-topbar { background: rgba(18,21,38,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
body.app-active.tcg-pk .stats-bar,
body.app-active.tcg-op .stats-bar,
body.app-active.tcg-yg .stats-bar { background: rgba(18,21,38,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
body.app-active.tcg-pk .mobile-header,
body.app-active.tcg-op .mobile-header,
body.app-active.tcg-yg .mobile-header { background: rgba(18,21,38,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.6s ease, transform 0.6s ease;
  cursor: pointer;
  overflow: hidden;
  background: #0c0e1a;
}
#splash::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url('splash.jpg');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  animation: splashIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
  transition: transform 0.4s ease, filter 0.4s ease;
}
#splash:hover::before {
  transform: scale(1.02);
  filter: brightness(1.08);
}
#splash.out { opacity: 0; transform: scale(1.04); pointer-events: none; }

.splash-hint {
  position: absolute;
  bottom: max(40px, env(safe-area-inset-bottom, 40px));
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(150,200,255,0.55);
  font-weight: 500;
  z-index: 2;
  animation: splashHintPulse 2.5s 1s ease-in-out infinite;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  pointer-events: none;
}

@keyframes splashHintPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

@keyframes splashIn {
  from { opacity: 0; transform: scale(1.06); }
  to { opacity: 1; transform: scale(1); }
}

/* Splash auf Smartphones: Vollbild mit Randabstand */
@media (max-width: 768px) {
  #splash {
    background: #0c1828;
  }
  #splash::before {
    inset: 20px;
    background-size: cover;
    background-position: center center;
    border-radius: 12px;
  }
}

/* ===== MAIN APP ===== */
#app {
  display: none; height: 100vh; overflow: hidden;
  flex-direction: row;
}
#app.show { display: flex; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px; min-width: 220px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  width: 100%; max-width: 180px; height: auto;
}
.sidebar-tagline {
  font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-3); margin-top: 4px; font-weight: 500;
}

.sidebar-section-label {
  font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-3); font-weight: 700; padding: 16px 16px 8px;
}

.tcg-nav {
  display: flex; flex-direction: column; gap: 4px; padding: 0 8px;
}
.tcg-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0 8px; height: 64px; border-radius: var(--radius);
  cursor: pointer; position: relative; overflow: hidden;
  border: 1px solid transparent;
  transition: background 0.2s, border-color 0.2s;
}
.tcg-nav-item::before {
  content:''; position:absolute; inset:0;
  background: var(--item-glow, transparent);
  opacity: 0; transition: opacity 0.2s;
  border-radius: inherit;
}
.tcg-nav-item:hover { background: var(--bg-hover); }
.tcg-nav-item.active { background: var(--item-bg); border-color: var(--item-border); }
.tcg-nav-item.active::before { opacity: 1; }

.tcg-nav-item.pk { --item-bg: rgba(244,200,0,0.06); --item-border: rgba(244,200,0,0.2); --item-glow: radial-gradient(ellipse at 0% 50%, rgba(244,200,0,0.07) 0%, transparent 70%); }
.tcg-nav-item.op { --item-bg: rgba(232,64,64,0.06); --item-border: rgba(232,64,64,0.2); --item-glow: radial-gradient(ellipse at 0% 50%, rgba(232,64,64,0.07) 0%, transparent 70%); }
.tcg-nav-item.yg { --item-bg: rgba(155,93,229,0.06); --item-border: rgba(155,93,229,0.2); --item-glow: radial-gradient(ellipse at 0% 50%, rgba(155,93,229,0.07) 0%, transparent 70%); }

.tcg-nav-logo {
  width: 88px; height: 42px; object-fit: contain; flex-shrink: 0;
}
.tcg-nav-item.op .tcg-nav-logo { filter: brightness(0) invert(1); opacity: 0.75; }
.tcg-nav-item.active.op .tcg-nav-logo { opacity: 1; }

.tcg-nav-arrow {
  margin-left: auto; font-size: 12px; color: var(--text-3);
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
}
.tcg-nav-item:hover .tcg-nav-arrow, .tcg-nav-item.active .tcg-nav-arrow { opacity: 1; }
.tcg-nav-item.active .tcg-nav-arrow { transform: translateX(2px); }
.tcg-nav-item.active.pk .tcg-nav-arrow { color: var(--pk); }
.tcg-nav-item.active.op .tcg-nav-arrow { color: var(--op); }
.tcg-nav-item.active.yg .tcg-nav-arrow { color: var(--yg); }

.sidebar-footer {
  margin-top: auto; padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-back {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text-2); font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  cursor: pointer; text-transform: uppercase; font-family: 'Sora', sans-serif;
  transition: all 0.2s; width: 100%; justify-content: center;
}
.sidebar-back:hover { background: rgba(255,255,255,0.08); color: var(--text); }

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
}

.main-topbar {
  height: 56px; min-height: 56px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
}

.section-tabs-row {
  display: flex; gap: 4px;
}
.sec-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 8px; border: 1px solid transparent;
  background: none; color: var(--text-2); font-family: 'Sora', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s;
  white-space: nowrap;
}
.sec-btn i { font-size: 14px; }
.sec-btn:hover { background: var(--bg-hover); color: var(--text); }
.sec-btn.active { background: var(--accent-dim); border-color: var(--accent-glow); color: var(--accent); }

.topbar-right {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
}
.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-2);
  font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.2px;
}
.topbar-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--border-strong); }
.topbar-btn.primary { background: var(--accent-dim); border-color: var(--accent-glow); color: var(--accent); }
.topbar-btn.primary:hover { background: var(--accent-dim); filter: brightness(1.15); }

.sort-select {
  padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-2);
  font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; outline: none; appearance: none;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex; gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  flex: 1; padding: 14px 20px; background: var(--bg-panel);
}
.stat-label {
  font-size: 10px; color: var(--text-2); font-weight: 500; margin-bottom: 4px; letter-spacing: 0.2px;
}
.stat-value {
  font-size: 20px; font-weight: 700; color: var(--text); line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-value.green { color: #4ade80; }
.stat-sub {
  font-size: 10px; color: var(--text-3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.stat-trend {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: #4ade80; font-weight: 500;
}

/* ===== CARDS SCROLL AREA ===== */
.cards-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.cards-area::-webkit-scrollbar { width: 6px; }
.cards-area::-webkit-scrollbar-track { background: transparent; }
.cards-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}

.card-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  display: flex; flex-direction: column;
}
.card-tile:hover {
  transform: translateY(-3px);
  border-color: var(--accent-glow);
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}
.card-tile.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-glow), 0 8px 30px rgba(0,0,0,0.25);
}
.card-img-box {
  aspect-ratio: 2/3; background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  position: relative;
}
.card-img-box img { width: 100%; height: 100%; object-fit: cover; }
.card-img-box .placeholder { font-size: 28px; color: rgba(255,255,255,0.07); }
.card-tile-body { padding: 10px; display: flex; flex-direction: column; gap: 2px; }
.card-tile-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-tile-sub { font-size: 9px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-tile-num { font-size: 9px; color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.card-tile-value { font-size: 16px; font-weight: 700; color: #4ade80; margin: 4px 0; }
.card-tile-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
.ctag {
  font-size: 8px; padding: 2px 6px; border-radius: 4px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
}
.ctag-type { background: rgba(59,130,246,0.15); color: #93c5fd; }
.ctag-lang { background: rgba(244,200,0,0.1); color: #fbbf24; }
.ctag-cond { background: rgba(74,222,128,0.1); color: #4ade80; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; color: var(--text-3); gap: 10px; text-align: center;
}
.empty-state i { font-size: 40px; opacity: 0.18; }
.empty-state p { font-size: 12px; line-height: 1.6; }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  width: 300px; min-width: 300px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.detail-panel.hidden { display: none; }

.detail-topbar {
  height: 56px; min-height: 56px;
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.detail-back-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 10px; border-radius: 7px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-2);
  font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.3px;
}
.detail-back-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.detail-nav-btns { margin-left: auto; display: flex; gap: 4px; }
.detail-nav-btn {
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-2);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 12px; transition: all 0.18s;
}
.detail-nav-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.detail-scroll { flex: 1; overflow-y: auto; padding: 16px; }
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.detail-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; line-height: 1.2; }
.detail-type-row { font-size: 11px; color: var(--text-2); margin-bottom: 12px; }
.detail-img-wrap {
  width: 100%; display: flex; justify-content: center; margin-bottom: 14px;
}
.detail-img {
  max-width: 140px; max-height: 200px; border-radius: 8px; object-fit: contain;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.detail-value-row {
  text-align: center; margin-bottom: 8px;
}
.detail-value {
  font-size: 28px; font-weight: 700; color: #4ade80;
  font-variant-numeric: tabular-nums;
}
.detail-profit {
  font-size: 11px; font-weight: 600; margin-top: 2px;
}
.detail-fields {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px;
}
.dfield {
  background: var(--bg-card); border-radius: 8px; padding: 8px 10px;
}
.dfield-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); font-weight: 700; margin-bottom: 2px; }
.dfield-val { font-size: 12px; font-weight: 600; color: var(--text); }
.dfield-val.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }

.detail-tags-section { margin-bottom: 14px; }
.detail-tags-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); font-weight: 700; margin-bottom: 6px; }
.detail-tags-row { display: flex; gap: 5px; flex-wrap: wrap; }
.dtag {
  padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--accent-glow); background: var(--accent-dim); color: var(--accent);
}
.dtag.type { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: #93c5fd; }
.dtag.lang { background: rgba(244,200,0,0.1); border-color: rgba(244,200,0,0.25); color: #fbbf24; }
.dtag.cond { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.25); color: #4ade80; }

.detail-actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.daction-btn {
  flex: 1; padding: 9px 0; border-radius: 8px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-2);
  font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; text-align: center;
}
.daction-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.daction-btn.danger {
  background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); color: #f87171;
}
.daction-btn.danger:hover { background: rgba(239,68,68,0.15); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 1000; display: flex; align-items: flex-start; justify-content: center;
  padding: 16px; overflow-y: auto;
}
.modal {
  background: var(--bg-panel); border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg); width: 100%; max-width: 460px;
  padding: 22px; margin: auto;
}
.modal-title {
  font-size: 15px; font-weight: 700; margin-bottom: 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.05); color: var(--text-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: all 0.18s;
}
.modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.form-group { margin-bottom: 11px; }
.form-label {
  display: block; font-size: 9px; font-weight: 700; color: var(--text-2);
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px;
}
.form-control {
  width: 100%; padding: 9px 11px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Sora', sans-serif;
  font-size: 12px; outline: none; transition: border-color 0.18s; appearance: none;
}
.form-control:focus { border-color: var(--accent-glow); }
.form-control option { background: #161929; }
.form-control.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.form-hint { font-size: 9px; color: var(--text-3); margin-top: 3px; }

.set-search-wrap { position: relative; }
.set-dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg-card); border: 1px solid var(--border-strong);
  border-top: none; border-radius: 0 0 8px 8px;
  max-height: 190px; overflow-y: auto; z-index: 200; display: none;
}
.set-dropdown.open { display: block; }
.set-option {
  padding: 7px 11px; cursor: pointer; font-size: 11px;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.15s;
}
.set-option:hover { background: rgba(255,255,255,0.05); }
.set-code { font-size: 9px; font-weight: 700; color: var(--text-3); min-width: 36px; font-family: 'JetBrains Mono', monospace; }
.set-year { color: var(--text-3); font-size: 9px; margin-left: auto; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.graded-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.img-upload-area {
  border: 2px dashed rgba(255,255,255,0.09); border-radius: 8px;
  text-align: center; cursor: pointer; transition: border-color 0.18s;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.img-upload-area:hover { border-color: var(--accent-glow); }
.img-upload-area.card-raw { aspect-ratio: 2/3; }
.img-upload-area.card-graded { aspect-ratio: 2/3; }
.img-upload-area.sealed { aspect-ratio: 2/3; }
.img-upload-area .up-icon { font-size: 22px; color: rgba(255,255,255,0.15); margin-bottom: 6px; }
.img-upload-area p { font-size: 9px; color: rgba(255,255,255,0.2); }
.img-upload-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
.img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.submit-btn {
  width: 100%; padding: 10px; border-radius: 9px; border: none;
  font-size: 13px; font-weight: 700; font-family: 'Sora', sans-serif;
  cursor: pointer; margin-top: 6px; transition: opacity 0.18s; letter-spacing: 0.2px;
}
.submit-btn:hover { opacity: 0.88; }
.submit-btn-pk { background: linear-gradient(135deg, #f4c800, #e08000); color: #000; }
.submit-btn-op { background: linear-gradient(135deg, #c41e3a, #ff6b7a); color: #fff; }
.submit-btn-yg { background: linear-gradient(135deg, #6b21a8, #9b5de5); color: #fff; }

/* ===== SCROLLBAR ===== */
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

/* Mobile Upload-Buttons (Kamera + Galerie) - Desktop versteckt */
.mobile-upload-buttons { display: none; }

/* ===== MOBILE HEADER (default hidden) ===== */
.mobile-header { display: none; }
.mobile-fab { display: none; }

/* Auf Mobile: Header nur zeigen, wenn die App sichtbar ist (nicht im Splash) */
body:has(#app.show) .mobile-header { /* placeholder; eigentliche Regel in @media */ }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .sidebar { width: 180px; min-width: 180px; }
}

@media (max-width: 768px) {
  /* Body darf scrollen */
  body { overflow: auto; height: auto; min-height: 100vh; }

  /* App layout umschalten: Sidebar weg, alles vertikal */
  #app { height: auto; min-height: 100vh; flex-direction: column; overflow: visible; }
  #app.show { display: flex; }

  /* Sidebar verstecken */
  .sidebar { display: none; }

  /* Mobile Header einblenden — gesteuert via .app-active Klasse auf body */
  .mobile-header { display: none; }
  body.app-active .mobile-header { display: flex; }
  body.app-active .mobile-fab { display: flex; }
  .mobile-header {
    flex-direction: column;
    position: sticky; top: 0; z-index: 50;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding-top: env(safe-area-inset-top, 0px);
  }
  .mobile-header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
  }
  .mobile-header-title {
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text);
  }
  .mobile-home-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-2); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
  }
  .mobile-home-btn:active { background: rgba(255,255,255,0.1); }

  .mobile-tcg-tabs {
    display: flex; padding: 0 12px 10px; gap: 6px;
  }
  .mobile-tcg-tab {
    flex: 1; padding: 10px 8px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.03);
    color: var(--text-2); font-family: 'Sora', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all 0.18s; min-height: 44px;
  }
  .mobile-tcg-tab.pk.active { background: rgba(244,200,0,0.12); border-color: rgba(244,200,0,0.35); color: var(--pk); }
  .mobile-tcg-tab.op.active { background: rgba(232,64,64,0.12); border-color: rgba(232,64,64,0.35); color: var(--op); }
  .mobile-tcg-tab.yg.active { background: rgba(155,93,229,0.12); border-color: rgba(155,93,229,0.35); color: var(--yg); }

  /* Main content darf scrollen */
  .main-content { overflow: visible; }

  /* Topbar: Section-Tabs horizontal scrollbar, Buttons in zweite Zeile */
  .main-topbar {
    height: auto; min-height: auto;
    padding: 10px 12px; gap: 8px;
    flex-wrap: wrap;
    position: sticky; top: 110px; z-index: 40;
  }
  .section-tabs-row {
    width: 100%; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-wrap: nowrap;
    padding-bottom: 2px;
  }
  .section-tabs-row::-webkit-scrollbar { display: none; }
  .sec-btn {
    padding: 9px 13px; font-size: 12px; flex-shrink: 0;
    min-height: 40px;
  }
  .topbar-right {
    width: 100%; margin-left: 0;
    display: flex; gap: 6px;
  }
  .sort-select { flex: 1; min-height: 40px; font-size: 12px; }
  .topbar-btn { min-height: 40px; padding: 8px 12px; font-size: 11px; }
  /* "Item hinzufügen"-Button in Topbar verstecken (FAB übernimmt) */
  .topbar-btn.primary { display: none !important; }

  /* Stats-Bar: 2x2-Grid */
  .stats-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  }
  .stat-cell { padding: 10px 12px; }
  .stat-value { font-size: 16px; }
  .stat-label { font-size: 9px; }

  /* Cards-Grid: 2 Spalten, kleinere Lücken */
  .cards-area { padding: 12px 12px 100px; }
  .cards-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .card-tile-name { font-size: 12px; }
  .card-tile-value { font-size: 15px; }

  /* Detail-Panel: Vollbild-Overlay statt Sidebar */
  .detail-panel {
    display: flex !important;
    position: fixed; inset: 0; z-index: 200;
    width: 100%; min-width: 0;
    border-left: none;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .detail-panel.hidden { display: none !important; }
  .detail-topbar { padding: 0 12px; }
  .detail-back-label { display: none; }
  .detail-back-btn { padding: 8px; min-width: 40px; min-height: 40px; justify-content: center; }
  .detail-nav-btn { width: 40px; height: 40px; }
  .detail-img { max-width: 180px; max-height: 260px; }
  .detail-fields { grid-template-columns: 1fr 1fr; gap: 8px; }
  .detail-actions { padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  .daction-btn { padding: 12px 0; font-size: 12px; min-height: 44px; }

  /* FAB Styling */
  .mobile-fab {
    align-items: center; justify-content: center;
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    border: none;
    font-size: 26px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 4px var(--accent-glow);
    cursor: pointer;
    z-index: 100;
    transition: transform 0.15s;
  }
  .mobile-fab:active { transform: scale(0.93); }

  /* MODAL: Vollbild-Sheet auf Mobile */
  .modal-overlay { padding: 0; align-items: stretch; }
  .modal {
    max-width: 100%;
    border-radius: 16px 16px 0 0;
    margin: 0; margin-top: auto;
    padding: 18px 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    max-height: 95vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-title { font-size: 16px; margin-bottom: 16px; }
  .modal-close { width: 36px; height: 36px; font-size: 16px; }

  /* Form-Felder: größere Touch-Targets, größere Schrift (verhindert iOS-Zoom) */
  .form-control {
    padding: 12px 13px;
    font-size: 16px;  /* ≥16px verhindert Auto-Zoom auf iOS beim Fokus */
    min-height: 46px;
  }
  .form-control.mono { font-size: 14px; }
  .form-label { font-size: 10px; }
  .set-option { padding: 12px; font-size: 13px; min-height: 44px; }
  .set-dropdown { max-height: 240px; }

  .submit-btn { padding: 14px; font-size: 14px; min-height: 50px; }

  /* Mobile Upload-Buttons sichtbar machen */
  .img-upload-area {
    /* Klick auf die Vorschau-Area auf Mobile abschalten - User soll die Buttons benutzen */
    pointer-events: none;
  }
  .img-upload-area.has-image {
    /* Wenn schon ein Bild da ist, sehen wir nur die Vorschau */
    pointer-events: none;
  }
  .mobile-upload-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .mobile-upload-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    padding: 12px 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    min-height: 46px;
    transition: background 0.15s;
  }
  .mobile-upload-btn i { font-size: 16px; color: var(--accent); }
  .mobile-upload-btn:active { background: rgba(255,255,255,0.1); }

  /* Splash-Hint kleiner */
  .splash-hint { font-size: 9px; letter-spacing: 3px; bottom: max(30px, env(safe-area-inset-bottom)); }
}

/* Sehr kleine Screens: 1-spaltige Cards */
@media (max-width: 380px) {
  .cards-grid { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .mobile-tcg-tab { font-size: 11px; padding: 9px 4px; }
}

.tcg-nav-text-wrap { display: flex; flex-direction: column; gap: 2px; }
.tcg-nav-label { font-size: 13px; font-weight: 700; color: var(--text); font-family: 'Sora', sans-serif; }
.tcg-nav-sublabel { font-size: 9px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
.tcg-nav-item.active.pk .tcg-nav-label { color: var(--pk); }
.tcg-nav-item.active.op .tcg-nav-label { color: var(--op); }
.tcg-nav-item.active.yg .tcg-nav-label { color: var(--yg); }

.splash-tcg-icon { font-size: 28px; margin-bottom: 4px; }
.splash-tcg-title { font-size: 16px; font-weight: 800; color: var(--text); font-family: 'Sora', sans-serif; line-height: 1.1; }
.splash-tcg-name { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-2); margin-top: 3px; }
.splash-tcg:hover.pk .splash-tcg-title { color: var(--pk); }
.splash-tcg:hover.op .splash-tcg-title { color: var(--op); }
.splash-tcg:hover.yg .splash-tcg-title { color: var(--yg); }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" onclick="enterApp('pk')">
  <div class="splash-hint">Klicken zum Starten</div>
</div>

<!-- MOBILE HEADER (nur auf kleinen Screens sichtbar) -->
<div id="mobileHeader" class="mobile-header">
  <div class="mobile-header-top">
    <div class="mobile-header-title">Trading Card Manager</div>
    <button class="mobile-home-btn" onclick="goHome()" aria-label="Zur Startseite"><i class="ti ti-home"></i></button>
  </div>
  <div class="mobile-tcg-tabs">
    <button class="mobile-tcg-tab pk active" data-tcg="pk" onclick="switchTcg('pk')">Pokémon</button>
    <button class="mobile-tcg-tab op" data-tcg="op" onclick="switchTcg('op')">One Piece</button>
    <button class="mobile-tcg-tab yg" data-tcg="yg" onclick="switchTcg('yg')">Yu-Gi-Oh!</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img class="sidebar-logo" src="splash.jpg" alt="Logo">
      <div class="sidebar-tagline">Trading Card Manager</div>
    </div>
    <div class="sidebar-section-label">Trading Card Games</div>
    <nav class="tcg-nav">
      <div class="tcg-nav-item pk" data-tcg="pk" onclick="switchTcg('pk')">
        <div class="tcg-nav-text-wrap">
          <div class="tcg-nav-label">Pokémon</div>
          <div class="tcg-nav-sublabel">Trading Card Game</div>
        </div>
        <i class="ti ti-chevron-right tcg-nav-arrow"></i>
      </div>
      <div class="tcg-nav-item op" data-tcg="op" onclick="switchTcg('op')">
        <div class="tcg-nav-text-wrap">
          <div class="tcg-nav-label">One Piece</div>
          <div class="tcg-nav-sublabel">Card Game</div>
        </div>
        <i class="ti ti-chevron-right tcg-nav-arrow"></i>
      </div>
      <div class="tcg-nav-item yg" data-tcg="yg" onclick="switchTcg('yg')">
        <div class="tcg-nav-text-wrap">
          <div class="tcg-nav-label">Yu-Gi-Oh!</div>
          <div class="tcg-nav-sublabel">Trading Card Game</div>
        </div>
        <i class="ti ti-chevron-right tcg-nav-arrow"></i>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-back" onclick="goHome()"><i class="ti ti-home"></i> Zur Startseite</button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-content">
    <!-- TOP BAR -->
    <div class="main-topbar">
      <div class="section-tabs-row" id="sectionTabs"></div>
      <div class="topbar-right">
        <select class="sort-select" id="sortSelect" onchange="renderCards()">
          <option value="val-desc">Sortieren: Wert (hoch → niedrig)</option>
          <option value="val-asc">Sortieren: Wert (niedrig → hoch)</option>
          <option value="name">Sortieren: Name</option>
        </select>
        <button class="topbar-btn" id="exportBtn" onclick="exportToWord()" style="display:none"><i class="ti ti-file-word"></i> Export</button>
        <button class="topbar-btn primary" onclick="openFormModal()"><i class="ti ti-plus"></i> Item hinzufügen</button>
      </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- CARDS GRID -->
    <div class="cards-area">
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <aside class="detail-panel hidden" id="detailPanel">
    <div class="detail-topbar">
      <button class="detail-back-btn" onclick="closeDetail()"><i class="ti ti-arrow-left"></i> <span class="detail-back-label">Zurück zur Übersicht</span></button>
      <div class="detail-nav-btns">
        <button class="detail-nav-btn" onclick="navigateDetail(-1)"><i class="ti ti-chevron-left"></i></button>
        <button class="detail-nav-btn" onclick="navigateDetail(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="detail-scroll" id="detailScroll"></div>
    <div class="detail-actions" id="detailActions"></div>
  </aside>
</div>

<!-- MOBILE FAB (Floating Action Button) -->
<button class="mobile-fab" onclick="openFormModal()" aria-label="Item hinzufügen"><i class="ti ti-plus"></i></button>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal" style="display:none;">
  <div class="modal">
    <div class="modal-title">
      <span id="formModalTitle">Neues Item</span>
      <button class="modal-close" onclick="closeFormModal()"><i class="ti ti-x"></i></button>
    </div>
    <form id="itemForm" onsubmit="saveItem(event)">
      <div class="form-group">
        <label class="form-label">Art des Items</label>
        <select class="form-control" id="f_type" onchange="onTypeChange()">
          <option value="Karte RAW">Karte RAW</option>
          <option value="Karte Graded">Karte Graded</option>
          <option value="Booster Box">Booster Box</option>
          <option value="ETB">ETB (Elite Trainer Box)</option>
          <option value="Kollektion">Kollektion</option>
          <option value="Blister">Blister</option>
          <option value="UPC">UPC</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Name des Items</label>
        <input type="text" class="form-control" id="f_name" placeholder="z.B. Glurak ex Special Art" required>
      </div>
      <div class="form-group" id="rarityGroup">
        <label class="form-label">Rarität</label>
        <select class="form-control" id="f_rarity">
          <option value="">— keine Angabe —</option>
          <option value="Unlimited">Unlimited</option>
          <option value="1. Edition">1. Edition</option>
          <option value="SAR">SAR</option>
          <option value="IR">IR</option>
          <option value="Reverse Holo">Reverse Holo</option>
          <option value="Holo">Holo</option>
        </select>
      </div>
      <div class="form-group" id="cardNumberGroup">
        <label class="form-label">Nummer der Karte</label>
        <input type="text" class="form-control mono" id="f_cardnumber" placeholder="z.B. 199/165">
        <div class="form-hint">Set-Kürzel, Nummer oder beides</div>
      </div>
      <div class="form-group">
        <label class="form-label">Set</label>
        <div class="set-search-wrap">
          <input type="text" class="form-control" id="f_set_search" placeholder="Set suchen..." autocomplete="off" oninput="filterSets()" onfocus="showSetDropdown()" onblur="hideSetDropdown()">
          <input type="hidden" id="f_set_name">
          <div class="set-dropdown" id="setDropdown"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Zustand</label>
        <div id="condWrapper"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Sprache</label>
        <select class="form-control" id="f_lang">
          <option>Deutsch</option><option>Englisch</option><option>Japanisch</option>
          <option>Chinesisch</option><option>Spanisch</option><option>Französisch</option><option>Italienisch</option>
        </select>
      </div>
      <div class="row2">
        <div class="form-group">
          <label class="form-label">Aktueller Wert (€)</label>
          <input type="number" class="form-control" id="f_value" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group" id="purchaseGroup">
          <label class="form-label">Einkaufspreis (€)</label>
          <input type="number" class="form-control" id="f_purchase" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Bild hochladen</label>
        <div class="img-upload-area card-raw" id="uploadArea" onclick="document.getElementById('f_img').click()">
          <div class="up-icon"><i class="ti ti-photo"></i></div>
          <p>Bild hochladen · JPG / PNG / WebP</p>
          <input type="file" id="f_img" accept="image/*" onchange="previewImg(event)" style="display:none">
        </div>
        <!-- Mobile-only: separate Buttons für Kamera & Galerie -->
        <div class="mobile-upload-buttons">
          <button type="button" class="mobile-upload-btn" onclick="document.getElementById('f_img_camera').click()">
            <i class="ti ti-camera"></i> Foto aufnehmen
          </button>
          <button type="button" class="mobile-upload-btn" onclick="document.getElementById('f_img').click()">
            <i class="ti ti-photo"></i> Aus Galerie
          </button>
          <input type="file" id="f_img_camera" accept="image/*" capture="environment" onchange="previewImg(event)" style="display:none">
        </div>
      </div>
      <button type="submit" class="submit-btn" id="formSubmitBtn">Item speichern</button>
    </form>
  </div>
</div>


<script>
const POKEMON_SETS = [

async function loadData() {
  try {
    const { data: rows, error } = await sb.from('items').select('*');
    if (error) throw error;
    data = {};
    rows.forEach(row => {
      if (!data[row.tcg]) data[row.tcg] = {};
      if (!data[row.tcg][row.section]) data[row.tcg][row.section] = [];
      data[row.tcg][row.section].push({
        id:         row.id,
        type:       row.type,
        name:       row.name,
        cardNumber: row.card_number,
        setName:    row.set_name,
        rarity:     row.rarity,
        condition:  row.condition,
        lang:       row.lang,
        value:      row.value,
        purchase:   row.purchase,
        imgData:    row.img_data
      });
    });
  } catch(e) {
    console.error('loadData Fehler:', e);
    data = {};
  }
}

async function saveData() {
  try {
    const rows = [];
    for (const tcg of Object.keys(data)) {
      for (const section of Object.keys(data[tcg])) {
        for (const item of data[tcg][section]) {
          rows.push(itemToRow(item, tcg, section));
        }
      }
    }
    if (rows.length > 0) {
      const { error } = await sb.from('items').upsert(rows, { onConflict: 'id' });
      if (error) throw error;
    }
  } catch(e) {
    console.error('saveData Fehler:', e);
    throw e;
  }
}

function itemToRow(item, tcg, section) {
  return {
    id:          item.id,
    tcg:         tcg,
    section:     section,
    type:        item.type,
    name:        item.name,
    card_number: item.cardNumber || null,
    set_name:    item.setName || null,
    rarity:      item.rarity || null,
    condition:   item.condition || null,
    lang:        item.lang || null,
    value:       parseFloat(item.value) || 0,
    purchase:    item.purchase ? parseFloat(item.purchase) : null,
    img_data:    item.imgData || null
  };
}

async function saveOneItem(item, tcg, section) {
  try {
    const row = itemToRow(item, tcg, section);
    const { error } = await sb.from('items').upsert(row, { onConflict: 'id' });
    if (error) throw error;
    return true;
  } catch(e) {
    console.error('saveOneItem Fehler:', e);
    return false;
  }
}

    document.body.appendChild(el);
  }
  el.style.background = isError ? '#dc2626' : '#16a34a';
  el.style.color = '#fff';

  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2000);

function compressImage(file, maxDim = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden'));
    reader.onload = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('Bild konnte nicht geladen werden'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          } else {
            width = Math.round(width * (maxDim / height));
            height = maxDim;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function previewImg(e) {
  const file = e.target.files[0]; if (!file) return;
  const ua = document.getElementById("uploadArea");
  ua.style.opacity = '0.5';
  try {
    imgBase64 = await compressImage(file, 1200, 0.75);
    updateUploadPreview(imgBase64);
    const kb = Math.round(imgBase64.length * 0.75 / 1024);
    console.log(`Bild komprimiert: ~${kb} KB`);
  } catch(err) {
    console.error('Komprimierung fehlgeschlagen:', err);
    alert('Bild konnte nicht verarbeitet werden.');
  } finally {
    ua.style.opacity = '1';
  }
}

function updateUploadPreview(src) {
  const ua = document.getElementById("uploadArea");
  const ex = ua.querySelector("img"); if (ex) ex.remove();
  const icon = ua.querySelector(".up-icon"), p = ua.querySelector("p");
  if (src) { const img = document.createElement("img"); img.src = src; ua.appendChild(img); if(icon) icon.style.display="none"; if(p) p.style.display="none"; }
  else { if(icon) icon.style.display=""; if(p) p.style.display=""; }
}

async function saveItem(e) {
  e.preventDefault();
  const type = document.getElementById("f_type").value;
  const name = document.getElementById("f_name").value.trim(); if (!name) return;
  const newId = Date.now() * 1000 + Math.floor(Math.random() * 1000);
  const item = {
    type, name,
    cardNumber: document.getElementById("f_cardnumber").value.trim(),
    setName: document.getElementById("f_set_name").value,
    rarity: document.getElementById("f_rarity")?.value || "",
    condition: getCondition(type),
    lang: document.getElementById("f_lang").value,
    value: document.getElementById("f_value").value,
    purchase: document.getElementById("f_purchase")?.value||"",
    imgData: imgBase64, id: newId
  };
  const tcg = state.activeTcg, section = state.activeSection;
  getItems(tcg, section).push(item);
  closeFormModal(); renderContent();
  showSaveStatus('Speichere…');
  const ok = await saveOneItem(item, tcg, section);
  if (ok) {
    showSaveStatus('Gespeichert ✓');
  } else {
    showSaveStatus('Fehler beim Speichern!', true);
  }
}

function populateSetDropdown() {
  const sets = TCG_CONFIG[state.activeTcg].sets;
  document.getElementById("setDropdown").innerHTML = sets.map(s =>
    `<div class="set-option" onmousedown="selectSet('${s.name.replace(/'/g,"\\'")}')">
      <span class="set-code">${s.code}</span><span>${s.name}</span><span class="set-year">${s.year}</span>
    </div>`
  ).join("");
}

function filterSets() {
  const q = document.getElementById("f_set_search").value.toLowerCase();
  const sets = TCG_CONFIG[state.activeTcg].sets;
  const filtered = q ? sets.filter(s=>s.name.toLowerCase().includes(q)||s.code.toLowerCase().startsWith(q)) : sets;
  const dd = document.getElementById("setDropdown");
  dd.innerHTML = filtered.length ? filtered.map(s =>
    `<div class="set-option" onmousedown="selectSet('${s.name.replace(/'/g,"\\'")}')">
      <span class="set-code">${s.code}</span><span>${s.name}</span><span class="set-year">${s.year}</span>
    </div>`
  ).join("") : `<div class="set-option" style="color:#888">Kein Set gefunden</div>`;
  dd.classList.add("open");
}

function showSetDropdown() { filterSets(); document.getElementById("setDropdown").classList.add("open"); }

function hideSetDropdown() { setTimeout(()=>document.getElementById("setDropdown").classList.remove("open"),200); }

function selectSet(name) {
  document.getElementById("f_set_search").value = name;
  document.getElementById("f_set_name").value = name;
  document.getElementById("setDropdown").classList.remove("open");
}

function showDetail(idx) {
  const item = getItems(state.activeTcg, state.activeSection)[idx]; if (!item) return;
  document.getElementById("detailModalTitle").textContent = item.name;
  const profit = (parseFloat(item.value)||0)-(parseFloat(item.purchase)||0);
  const hasProfit = item.purchase && parseFloat(item.purchase)>0;
  document.getElementById("detailContent").innerHTML = `
    ${item.imgData?`<div class="detail-img-wrap"><img class="detail-img" src="${item.imgData}" alt="${item.name}"></div>`:""}
    <div class="detail-value">${parseFloat(item.value).toFixed(2)} €</div>
    ${hasProfit?`<div class="detail-profit" style="color:${profit>=0?"#4ade80":"#f87171"};margin-bottom:14px">${profit>=0?"▲":"▼"} ${Math.abs(profit).toFixed(2)} € ${profit>=0?"Gewinn":"Verlust"} · EK: ${parseFloat(item.purchase).toFixed(2)} €</div>`:""}
    <div class="detail-grid">
      <div class="detail-field"><div class="detail-field-label">Art</div><div class="detail-field-val">${item.type}</div></div>
      <div class="detail-field"><div class="detail-field-label">Sprache</div><div class="detail-field-val">${item.lang}</div></div>
      ${item.cardNumber?`<div class="detail-field"><div class="detail-field-label">Kartennummer</div><div class="detail-field-val mono">${item.cardNumber}</div></div>`:""}
      ${item.setName?`<div class="detail-field"><div class="detail-field-label">Set</div><div class="detail-field-val" style="font-size:11px">${item.setName}</div></div>`:""}
      ${item.rarity?`<div class="detail-field"><div class="detail-field-label">Rarität</div><div class="detail-field-val">${item.rarity}</div></div>`:""}
      <div class="detail-field"><div class="detail-field-label">Zustand</div><div class="detail-field-val">${item.condition}</div></div>
      ${item.purchase?`<div class="detail-field"><div class="detail-field-label">Einkaufspreis</div><div class="detail-field-val">${parseFloat(item.purchase).toFixed(2)} €</div></div>`:""}
    </div>
    <button class="delete-btn" onclick="deleteItem(${idx})"><i class="ti ti-trash" aria-hidden="true"></i> Item löschen</button>`;
  document.getElementById("detailModal").style.display = "flex";
}

function closeDetailModal() { document.getElementById("detailModal").style.display = "none"; }

async function deleteItem(idx) {
  if (!confirm("Item wirklich löschen?")) return;
  const items = getItems(state.activeTcg, state.activeSection);
  const item = items[idx];
  if (!item) return;
  items.splice(idx, 1);
  closeDetailModal(); renderContent();
  showSaveStatus('Lösche…');
  try {
    await deleteItemFromDb(item.id);
    showSaveStatus('Gelöscht ✓');
  } catch(e) {
    showSaveStatus('Fehler beim Löschen!', true);
  }
}

function exportToWord() {
  const tcg = state.activeTcg, items = getItems(tcg, "forsale");
  const cfg = TCG_CONFIG[tcg], total = items.reduce((a,b)=>a+(parseFloat(b.value)||0),0);
  const now = new Date().toLocaleDateString("de-DE");
  const rows = items.map(item=>`<tr>
    <td style="padding:6px 10px;border:1px solid #ddd">${item.name}</td>
    <td style="padding:6px 10px;border:1px solid #ddd;font-family:monospace">${item.cardNumber||"—"}</td>
    <td style="padding:6px 10px;border:1px solid #ddd">${item.type}</td>
    <td style="padding:6px 10px;border:1px solid #ddd">${item.setName||"—"}</td>
    <td style="padding:6px 10px;border:1px solid #ddd">${item.condition}</td>
    <td style="padding:6px 10px;border:1px solid #ddd">${item.lang}</td>
    <td style="padding:6px 10px;border:1px solid #ddd;text-align:right">${parseFloat(item.value).toFixed(2)} €</td>
    <td style="padding:6px 10px;border:1px solid #ddd;text-align:right">${item.purchase?parseFloat(item.purchase).toFixed(2)+" €":"—"}</td>
  </tr>`).join("");
  const html = `<html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;margin:40px}table{border-collapse:collapse;width:100%}th{background:#f0f0f0;padding:8px 10px;border:1px solid #ddd;text-align:left}</style></head><body>
    <h1>${cfg.label} – Zum Verkauf</h1><p style="color:#888">Exportiert am ${now} · ${items.length} Items · by Felix Hanschke</p>
    <table><thead><tr><th>Name</th><th>Nr.</th><th>Art</th><th>Set</th><th>Zustand</th><th>Sprache</th><th>Wert</th><th>EK</th></tr></thead><tbody>${rows}</tbody></table>
    <p style="font-size:18px;font-weight:bold;color:green;margin-top:20px">Gesamtwert: ${total.toFixed(2)} €</p></body></html>`;
  const blob = new Blob([html],{type:"application/msword"});
  const url = URL.createObjectURL(blob), a = document.createElement("a");
  a.href=url; a.download=`Verkaufsliste_${cfg.label}_${now.replace(/\./g,"-")}.doc`; a.click(); URL.revokeObjectURL(url);
}

// ===== SPLASH / NAV =====
function enterApp(tcg) {
  const splash = document.getElementById('splash');
  splash.classList.add('out');
  state.activeTcg = tcg;
  setAccent(tcg);
  setTcgBackground(tcg);
  setTimeout(() => {
    splash.style.display = 'none';
    const app = document.getElementById('app');
    app.classList.add('show');
    document.body.classList.add('app-active');
    renderAll();
  }, 500);
}

function goHome() {
  const app = document.getElementById('app');
  app.classList.remove('show');
  app.style.display = 'none';
  document.body.classList.remove('app-active');
  const splash = document.getElementById('splash');
  splash.style.display = 'flex';
  splash.classList.remove('out');
}

// ===== RENDER =====
function renderAll() {
  renderSectionTabs();
  renderStats();
  renderCards();
  updateNavActive();
}

function updateNavActive() {
  document.querySelectorAll('.tcg-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tcg === state.activeTcg);
  });
  document.querySelectorAll('.mobile-tcg-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tcg === state.activeTcg);
  });
}

function renderSectionTabs() {
  const cfg = TCG_CONFIG[state.activeTcg];
  const secCfg = SECTIONS.find(s => s.id === state.activeSection);
  document.getElementById('sectionTabs').innerHTML = SECTIONS.map(s => {
    const active = s.id === state.activeSection;
    return `<button class="sec-btn ${active ? 'active' : ''}" onclick="switchSection('${s.id}')">
      <i class="ti ${s.icon}"></i>${s.label}
    </button>`;
  }).join('');
  // Export button
  const exportBtn = document.getElementById('exportBtn');
  const secC = SECTIONS.find(s => s.id === state.activeSection);
  exportBtn.style.display = secC.showExport ? 'flex' : 'none';
}

function renderStats() {
  const items = getItems(state.activeTcg, state.activeSection);
  const secCfg = SECTIONS.find(s => s.id === state.activeSection);
  const bar = document.getElementById('statsBar');
  if (!secCfg.showTotal) { bar.innerHTML = ''; return; }
  const total = items.reduce((a,b) => a + (parseFloat(b.value)||0), 0);
  const totalPurch = items.reduce((a,b) => a + (parseFloat(b.purchase)||0), 0);
  const avg = items.length ? total / items.length : 0;
  const maxItem = items.reduce((a,b) => (parseFloat(b.value)||0) > (parseFloat(a.value)||0) ? b : a, {value:0});
  const profit = total - totalPurch;
  bar.innerHTML = `
    <div class="stat-cell">
      <div class="stat-label">Gesamtwert der Sammlung</div>
      <div class="stat-value green">${total.toFixed(2).replace('.',',')} €</div>
      ${totalPurch > 0 ? `<div class="stat-trend"><i class="ti ti-trending-up"></i></div>` : ''}
    </div>
    <div class="stat-cell">
      <div class="stat-label">Anzahl Items</div>
      <div class="stat-value">${items.length}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Durchschnittswert</div>
      <div class="stat-value">${avg.toFixed(2).replace('.',',')} €</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Höchster Wert</div>
      <div class="stat-value">${parseFloat(maxItem.value||0).toFixed(2).replace('.',',')} €</div>
      ${maxItem.name ? `<div class="stat-sub">${maxItem.name}</div>` : ''}
    </div>
  `;
}

function getSortedItems() {
  const items = getItems(state.activeTcg, state.activeSection);
  const sort = document.getElementById('sortSelect')?.value || 'val-desc';
  const arr = [...items.entries()];
  if (sort === 'val-desc') arr.sort((a,b) => (parseFloat(b[1].value)||0) - (parseFloat(a[1].value)||0));
  else if (sort === 'val-asc') arr.sort((a,b) => (parseFloat(a[1].value)||0) - (parseFloat(b[1].value)||0));
  else arr.sort((a,b) => a[1].name.localeCompare(b[1].name));
  return arr; // [originalIdx, item]
}

function renderCards() {
  const arr = getSortedItems();
  const grid = document.getElementById('cardsGrid');
  if (!arr.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="ti ti-cards"></i>
      <p>Noch keine Items vorhanden.<br>Füge dein erstes Item hinzu!</p>
    </div>`;
    return;
  }
  grid.innerHTML = arr.map(([origIdx, item]) => {
    const isSealed = !['Karte RAW','Karte Graded'].includes(item.type);
    const isGraded = item.type === 'Karte Graded';
    const boxCls = isSealed ? 'sealed' : isGraded ? 'graded' : '';
    const imgHtml = item.imgData
      ? `<img src="${item.imgData}" alt="${item.name}">`
      : `<i class="ti ti-playing-card placeholder"></i>`;
    const selected = origIdx === state.selectedIdx;
    return `<div class="card-tile ${selected?'selected':''}" onclick="selectCard(${origIdx})">
      <div class="card-img-box ${boxCls}">${imgHtml}</div>
      <div class="card-tile-body">
        <div class="card-tile-name">${item.name}</div>
        ${item.setName?`<div class="card-tile-sub">${item.setName}</div>`:''}
        ${item.cardNumber?`<div class="card-tile-num">${item.cardNumber}</div>`:''}
        <div class="card-tile-value">${parseFloat(item.value).toFixed(2)} €</div>
        <div class="card-tile-tags">
          <span class="ctag ctag-type">${item.type}</span>
          ${item.lang?`<span class="ctag ctag-lang">${item.lang}</span>`:''}
          ${item.condition?`<span class="ctag ctag-cond">${item.condition}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectCard(idx) {
  state.selectedIdx = idx;
  renderCards();
  showDetailPanel(idx);
}

function closeDetail() {
  state.selectedIdx = null;
  document.getElementById('detailPanel').classList.add('hidden');
  renderCards();
}

function navigateDetail(dir) {
  const arr = getSortedItems();
  const curPos = arr.findIndex(([i]) => i === state.selectedIdx);
  const newPos = curPos + dir;
  if (newPos >= 0 && newPos < arr.length) {
    state.selectedIdx = arr[newPos][0];
    renderCards();
    showDetailPanel(state.selectedIdx);
  }
}

function showDetailPanel(idx) {
  const item = getItems(state.activeTcg, state.activeSection)[idx];
  if (!item) return;
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('hidden');
  const profit = (parseFloat(item.value)||0) - (parseFloat(item.purchase)||0);
  const hasProfit = item.purchase && parseFloat(item.purchase) > 0;
  document.getElementById('detailScroll').innerHTML = `
    <div class="detail-title">${item.name}</div>
    <div class="detail-type-row">${item.type}${item.setName ? ` · ${item.setName}` : ''}${item.cardNumber ? ` – ${item.cardNumber}` : ''}</div>
    ${item.imgData ? `<div class="detail-img-wrap"><img class="detail-img" src="${item.imgData}" alt="${item.name}"></div>` : ''}
    <div class="detail-value-row">
      <div class="detail-value">${parseFloat(item.value).toFixed(2)} €</div>
      ${hasProfit ? `<div class="detail-profit" style="color:${profit>=0?'#4ade80':'#f87171'}">${profit>=0?'▲':'▼'} ${Math.abs(profit).toFixed(2)} € ${profit>=0?'Gewinn':'Verlust'} · EK: ${parseFloat(item.purchase).toFixed(2)} €</div>` : ''}
    </div>
    <div class="detail-fields">
      <div class="dfield"><div class="dfield-label">Art des Items</div><div class="dfield-val">${item.type}</div></div>
      <div class="dfield"><div class="dfield-label">Sprache</div><div class="dfield-val">${item.lang||'—'}</div></div>
      ${item.cardNumber ? `<div class="dfield"><div class="dfield-label">Kartennummer</div><div class="dfield-val mono">${item.cardNumber}</div></div>` : ''}
      ${item.setName ? `<div class="dfield"><div class="dfield-label">Set</div><div class="dfield-val" style="font-size:10px">${item.setName}</div></div>` : ''}
      ${item.rarity ? `<div class="dfield"><div class="dfield-label">Rarität</div><div class="dfield-val">${item.rarity}</div></div>` : ''}
      <div class="dfield"><div class="dfield-label">Zustand</div><div class="dfield-val">${item.condition||'—'}</div></div>
      ${item.purchase ? `<div class="dfield"><div class="dfield-label">Einkaufspreis</div><div class="dfield-val">${parseFloat(item.purchase).toFixed(2)} €</div></div>` : ''}
    </div>
    <div class="detail-tags-section">
      <div class="detail-tags-label">Tags</div>
      <div class="detail-tags-row">
        <span class="dtag type">${item.type}</span>
        ${item.lang ? `<span class="dtag lang">${item.lang}</span>` : ''}
        ${item.condition ? `<span class="dtag cond">${item.condition}</span>` : ''}
      </div>
    </div>
  `;
  document.getElementById('detailActions').innerHTML = `
    <button class="daction-btn" onclick="closeDetail()">Schließen</button>
    <button class="daction-btn danger" onclick="deleteItem(${idx})"><i class="ti ti-trash"></i> Löschen</button>
  `;
}

function switchSection(sec) {
  state.activeSection = sec;
  state.selectedIdx = null;
  closeDetail();
  renderAll();
}

function switchTcg(tcg) {
  state.activeTcg = tcg;
  state.selectedIdx = null;
  setAccent(tcg);
  setTcgBackground(tcg);
  updateNavActive();
  closeDetail();
  renderAll();
}

// Setzt die Hintergrund-Klasse am body abhängig vom aktiven TCG
function setTcgBackground(tcg) {
  document.body.classList.remove('tcg-pk', 'tcg-op', 'tcg-yg');
  document.body.classList.add('tcg-' + tcg);
}

// Override deleteItem for new UI
async function deleteItem(idx) {
  if (!confirm('Item wirklich löschen?')) return;
  const items = getItems(state.activeTcg, state.activeSection);
  const item = items[idx];
  if (item && item.id) await deleteItemFromDb(item.id);
  items.splice(idx, 1);
  state.selectedIdx = null;
  closeDetail();
  renderAll();
}

// Override closeDetailModal (for compatibility)
function closeDetailModal() { closeDetail(); }

async function init() {
  await loadData();
}
init();
</script>
